name: Release
on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Bump major version?'
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version tag
        id: version
        run: |
          date_part=$(date +%Y%m%d)
          latest=$(git tag --sort=-v:refname | head -1)
          if [ -n "$latest" ]; then
            current_major=$(echo "$latest" | sed 's/^v//' | cut -d. -f1)
          else
            current_major=0
          fi
          if [ "${{ inputs.bump }}" = "true" ]; then
            major=$((current_major + 1))
          else
            major=$current_major
          fi
          # Append .N suffix if tag already exists (same-day re-release)
          base="v${major}.${date_part}"
          tag="$base"
          n=1
          while git rev-parse "$tag" >/dev/null 2>&1; do
            tag="${base}.${n}"
            n=$((n + 1))
          done
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.tag }}

      - name: Bundle deployment files
        run: |
          tar czf claude-inbox-${{ steps.version.outputs.tag }}.tar.gz \
            docker-compose.yml .env.example

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --generate-notes \
            claude-inbox-${{ steps.version.outputs.tag }}.tar.gz
