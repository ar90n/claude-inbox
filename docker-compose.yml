services:
  claude-mem:
    image: ghcr.io/ar90n/claude-inbox:latest
    build: .
    command: ["bun", "/usr/local/lib/node_modules/claude-mem/plugin/scripts/worker-service.cjs", "--daemon"]
    env_file: .env
    environment:
      HOME: /home/claude-inbox
      CLAUDE_MEM_WORKER_PORT: "37777"
    volumes:
      - claude_mem_data:/home/claude-inbox/.claude-mem
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:37777/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  chrome:
    image: kasmweb/chrome:1.15.0
    network_mode: "service:worker"
    shm_size: '512m'
    environment:
      VNC_PW: ${KASM_VNC_PW:-password}
      LAUNCH_URL: "about:blank"
      APP_ARGS: "--remote-debugging-port=9222 --remote-allow-origins=* --no-first-run --no-default-browser-check"
    volumes:
      - chrome_profile:/home/kasm-user
    depends_on:
      - worker
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9222/json/version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  worker:
    image: ghcr.io/ar90n/claude-inbox:latest
    build: .
    command: ["bin/claude-inbox-worker"]
    env_file: .env
    environment:
      CLAUDE_INBOX: /data/inbox
      CLAUDE_INBOX_WORKDIR: /workdir  # always /workdir inside container
      HOME: /home/claude-inbox
      CLAUDE_MODEL: ${CLAUDE_MODEL:-}
      CLAUDE_TIMEOUT: ${CLAUDE_TIMEOUT:-600}
      CLAUDE_MEM_WORKER_HOST: claude-mem
      CLAUDE_MEM_WORKER_PORT: "37777"
      CHROME_CDP_URL: http://localhost:9222
      SWITCHBOT_TOKEN: ${SWITCHBOT_TOKEN:-}
      SWITCHBOT_SECRET: ${SWITCHBOT_SECRET:-}
      GOOGLE_WORKSPACE_CLI_CLIENT_ID: ${GOOGLE_WORKSPACE_CLI_CLIENT_ID:-}
      GOOGLE_WORKSPACE_CLI_CLIENT_SECRET: ${GOOGLE_WORKSPACE_CLI_CLIENT_SECRET:-}
    ports:
      - "${KASM_PORT:-6901}:6901"
    volumes:
      - ${CLAUDE_INBOX:-~/.claude-inbox}:/data/inbox
      - claude_dot:/home/claude-inbox/.claude
      - claude_workdir:/workdir
      # To bind-mount a host project instead: comment the line above, uncomment below
      # - ${CLAUDE_INBOX_WORKDIR}:/workdir
      - nlm_auth:/home/claude-inbox/.notebooklm-mcp-cli
      - gws_config:/home/claude-inbox/.config/gws
    restart: unless-stopped
    depends_on:
      - claude-mem
      - preprocessor
    deploy:
      replicas: ${WORKERS:-1}

  preprocessor:
    image: ghcr.io/ar90n/claude-inbox:latest
    build: .
    command: ["bin/claude-inbox-preprocessor"]
    env_file: .env
    environment:
      CLAUDE_INBOX: /data/inbox
      HOME: /home/claude-inbox
    volumes:
      - ${CLAUDE_INBOX:-~/.claude-inbox}:/data/inbox
    restart: unless-stopped

  bridge-telegram:
    image: ghcr.io/ar90n/claude-inbox:latest
    build: .
    command: ["bin/claude-inbox-bridge-telegram", "--skip-pending"]
    env_file: .env
    environment:
      CLAUDE_INBOX: /data/inbox
      HOME: /home/claude-inbox
    volumes:
      - ${CLAUDE_INBOX:-~/.claude-inbox}:/data/inbox
    restart: unless-stopped

  cron:
    image: ghcr.io/ar90n/claude-inbox:latest
    build: .
    command: ["bin/claude-inbox-cron"]
    env_file: .env
    environment:
      CLAUDE_INBOX: /data/inbox
      HOME: /home/claude-inbox
    volumes:
      - ${CLAUDE_INBOX:-~/.claude-inbox}:/data/inbox
    restart: unless-stopped

  url-watch:
    image: ghcr.io/ar90n/claude-inbox:latest
    build: .
    command: ["bin/claude-inbox-url-watch"]
    env_file: .env
    environment:
      CLAUDE_INBOX: /data/inbox
      HOME: /home/claude-inbox
    volumes:
      - ${CLAUDE_INBOX:-~/.claude-inbox}:/data/inbox
    restart: unless-stopped

volumes:
  claude_dot:      # ~/.claude/ — Claude Code auth & sessions
  claude_workdir:  # /workdir — Claude's working directory
  claude_mem_data: # ~/.claude-mem/ — claude-mem memory store
  nlm_auth:        # ~/.notebooklm-mcp-cli/ — NotebookLM auth cookies
  gws_config:      # ~/.config/gws/ — Google Workspace CLI credentials
  chrome_profile:  # Chrome profile — persistent logins for browser-use
