services:
  claude-mem:
    build: .
    command: ["bun", "/usr/local/lib/node_modules/claude-mem/plugin/scripts/worker-service.cjs", "start"]
    user: "${DOCKER_UID}:${DOCKER_GID}"
    env_file: .env
    environment:
      HOME: /home/claude-inbox
      CLAUDE_MEM_WORKER_PORT: "37777"
    volumes:
      - claude_mem_data:/home/claude-inbox/.claude-mem
    restart: unless-stopped

  worker:
    build: .
    command: ["bin/claude-inbox-worker"]
    privileged: true  # required for Chrome (sandbox + perf_event_paranoid)
    user: "${DOCKER_UID}:${DOCKER_GID}"
    env_file: .env
    environment:
      CLAUDE_INBOX: /data/inbox
      CLAUDE_INBOX_WORKDIR: /workdir  # always /workdir inside container
      HOME: /home/claude-inbox
      CLAUDE_MODEL: ${CLAUDE_MODEL:-}
      CLAUDE_MEM_WORKER_HOST: claude-mem
      CLAUDE_MEM_WORKER_PORT: "37777"
      CLAUDE_CHROME: ${CLAUDE_CHROME:-}  # set to 1 to enable Claude in Chrome (requires Chrome extension + DISPLAY)
      SWITCHBOT_TOKEN: ${SWITCHBOT_TOKEN:-}
      SWITCHBOT_SECRET: ${SWITCHBOT_SECRET:-}
      DISPLAY: ${DISPLAY:-}  # required for Claude in Chrome and nlm-login
    volumes:
      - ${CLAUDE_INBOX:-~/.claude-inbox}:/data/inbox
      - claude_dot:/home/claude-inbox/.claude
      - claude_workdir:/workdir
      # To bind-mount a host project instead: comment the line above, uncomment below
      # - ${CLAUDE_INBOX_WORKDIR}:/workdir
      # Chrome profile mount for browser-use (optional — uncomment + set CHROME_PROFILE_DIR in .env)
      # - ${CHROME_PROFILE_DIR}:/home/claude-inbox/.config/google-chrome:ro
      # X11 forwarding for visible browser / nlm-login (optional — uncomment + set DISPLAY in environment below)
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
    restart: unless-stopped
    depends_on:
      - claude-mem
      - preprocessor
    deploy:
      replicas: ${WORKERS:-1}

  preprocessor:
    build: .
    command: ["bin/claude-inbox-preprocessor"]
    user: "${DOCKER_UID}:${DOCKER_GID}"
    env_file: .env
    environment:
      CLAUDE_INBOX: /data/inbox
      HOME: /home/claude-inbox
    volumes:
      - ${CLAUDE_INBOX:-~/.claude-inbox}:/data/inbox
    restart: unless-stopped

  bridge-telegram:
    build: .
    command: ["bin/claude-inbox-bridge-telegram", "--skip-pending"]
    user: "${DOCKER_UID}:${DOCKER_GID}"
    env_file: .env
    environment:
      CLAUDE_INBOX: /data/inbox
      HOME: /home/claude-inbox
    volumes:
      - ${CLAUDE_INBOX:-~/.claude-inbox}:/data/inbox
    restart: unless-stopped

  cron:
    build: .
    command: ["bin/claude-inbox-cron"]
    user: "${DOCKER_UID}:${DOCKER_GID}"
    env_file: .env
    environment:
      CLAUDE_INBOX: /data/inbox
      HOME: /home/claude-inbox
    volumes:
      - ${CLAUDE_INBOX:-~/.claude-inbox}:/data/inbox
    restart: unless-stopped

  url-watch:
    build: .
    command: ["bin/claude-inbox-url-watch"]
    user: "${DOCKER_UID}:${DOCKER_GID}"
    env_file: .env
    environment:
      CLAUDE_INBOX: /data/inbox
      HOME: /home/claude-inbox
    volumes:
      - ${CLAUDE_INBOX:-~/.claude-inbox}:/data/inbox
    restart: unless-stopped

volumes:
  claude_dot:      # ~/.claude/ — Claude Code auth & sessions
  claude_workdir:  # /workdir — Claude's working directory
  claude_mem_data: # ~/.claude-mem/ — claude-mem memory store
